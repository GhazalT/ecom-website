<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-4 ">
                <ul class="list-group" id ="item_list"></ul>
            </div> 
        </div>
        <div class="row">
            <div class="col-md-12">
                <form method="POST" class="row g-3">
                    {% csrf_token %}
                    <input type="hidden" id="items" name="items">
                <div class="col-md-6">
                    <label for="inputEmail4" class="form-label">Name</label>
                    <input id="name" name="name" type="text" class="form-control" id="inputEmail4">
                </div>
                <div class="col-md-6">
                    <label for="inputPassword4" class="form-label">Email</label>
                    <input id="email" name="email" type="text" class="form-control" id="inputPassword4">
                </div>
                <div class="col-12">
                    <label for="inputAddress" class="form-label">Address</label>
                    <input id="address" name="address" type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                </div>
                
                <div class="col-md-6">
                    <label for="inputCity" class="form-label">City</label>
                    <input id="city" name="city" type="text" class="form-control" id="inputCity">
                </div>
                <div class="col-md-4">
                    <label for="inputState" class="form-label">State</label>
                    <select id="state" name="state" id="inputState" class="form-select">
                    <option selected>Choose...</option>
                    <option>...</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="inputZip" class="form-label">Zip</label>
                    <input id="zip" name="zip" type="text" class="form-control" id="inputZip">
                </div>
                <div class="col-md-2">
                    <label for="inputZip" class="form-label">Amount to be paid</label>
                    <input readonly="" type="text" class="form-control" id="total" name="total">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Place order</button>
                </div>
                </form>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        if (localStorage.getItem('cart')==null){
          var cart={};
        }
        else{
          cart = JSON.parse(localStorage.getItem("cart"));
        }
        let total =0;
        for(var item in cart){
            let name=cart[item][1];
            let quantity = cart[item][0];
            let price = cart[item][2];
            total+=price;
            itemString=`<li class="list-group-item">${quantity} of ${name} costs $${price}</li>`
            $("#item_list").append(itemString);
        }
        total_price = `<li class="list-group-item d-flex justify-content-between align-items-center"> your total is<b> ${total}</b></li>`
        $("#item_list").append(total_price);
        $("#items").val(JSON.stringify(cart));
        $("#total").val(total) ;
    </script>
</body>

</html>
